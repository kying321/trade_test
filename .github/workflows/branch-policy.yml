name: Branch Policy

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  GOV_PRIMARY_BRANCHES: pi,lie

jobs:
  enforce-branch-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - name: Checkout Push head
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Validate branch policy
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-branch}" == "tag" ]]; then
            echo "[branch-policy] skip tag ref: ${GITHUB_REF_NAME}"
            exit 0
          fi

          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          ./system/scripts/branch_policy_guard.sh --source ci --branch "${branch_name}"

      - name: Run governance audit advisory summary
        if: always() && github.event_name == 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GOV_PRIMARY_BRANCHES: pi,lie
        run: |
          set -euo pipefail
          chmod +x ./system/scripts/run_governance_audit_advisory.sh
          ./system/scripts/run_governance_audit_advisory.sh \
            --repo "${{ github.repository }}" \
            --step-summary-out "${GITHUB_STEP_SUMMARY}" \
            --comment-out system/output/review/governance_audit_pr_comment.md \
            --emit-github-warning

      - name: Upload governance audit advisory artifacts
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: branch-policy-governance-audit
          path: |
            system/output/review/*_branch_governance_audit.json
            system/output/review/*_branch_governance_audit.md

      - name: Render governance audit advisory PR comment body
        if: always() && github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          test -f system/output/review/governance_audit_pr_comment.md

      - name: Upsert governance audit advisory PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- fenlie-governance-audit-advisory -->';
            const commentPath = 'system/output/review/governance_audit_pr_comment.md';
            if (!fs.existsSync(commentPath)) {
              core.warning(`governance audit PR comment body missing at ${commentPath}`);
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker);
            });
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
