name: Governance Health Audit

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  governance-health-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run non-destructive governance audit
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GOV_PRIMARY_BRANCHES: pi,lie
        run: |
          set -euo pipefail
          chmod +x ./system/scripts/run_governance_audit_advisory.sh
          ./system/scripts/run_governance_audit_advisory.sh \
            --repo "${{ github.repository }}" \
            --step-summary-out "${GITHUB_STEP_SUMMARY}" \
            --emit-github-warning

      - name: Upload governance audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-health-audit
          path: |
            system/output/review/*_branch_governance_audit.json
            system/output/review/*_branch_governance_audit.md
