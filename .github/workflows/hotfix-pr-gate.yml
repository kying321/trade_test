name: Hotfix PR Gate

on:
  pull_request:
    branches:
      - main
      - pi
      - lie
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  GOV_PRIMARY_BRANCHES: pi,lie
  GOV_PRIMARY_BRANCHES_REGEX: pi|lie

jobs:
  hotfix-pr-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - name: Validate hotfix branch to base mapping
        shell: bash
        run: |
          set -euo pipefail

          head_branch="${{ github.event.pull_request.head.ref }}"
          base_branch="${{ github.event.pull_request.base.ref }}"

          if [[ ! "${head_branch}" =~ ^hotfix/ ]]; then
            echo "[hotfix-pr-gate] skip non-hotfix PR head=${head_branch} base=${base_branch}"
            exit 0
          fi

          allowed_primary_regex="${GOV_PRIMARY_BRANCHES_REGEX:-pi|lie}"
          if [[ ! "${head_branch}" =~ ^hotfix/(${allowed_primary_regex})/([A-Za-z0-9._-]+)/([0-9]{12})$ ]]; then
            echo "ERROR: invalid hotfix branch pattern: ${head_branch}" >&2
            exit 2
          fi

          expected_base="${BASH_REMATCH[1]}"
          if [[ "${base_branch}" != "${expected_base}" ]]; then
            echo "ERROR: hotfix base mismatch. head=${head_branch} expects base=${expected_base} but PR targets ${base_branch}." >&2
            exit 2
          fi

          ./system/scripts/branch_policy_guard.sh --source hotfix-pr-gate --branch "${head_branch}"
          echo "[hotfix-pr-gate] PASS head=${head_branch} base=${base_branch}"

      - name: Run governance audit advisory summary
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GOV_PRIMARY_BRANCHES: pi,lie
        run: |
          set -euo pipefail
          chmod +x ./system/scripts/run_governance_audit_advisory.sh
          ./system/scripts/run_governance_audit_advisory.sh \
            --repo "${{ github.repository }}" \
            --step-summary-out "${GITHUB_STEP_SUMMARY}" \
            --comment-out system/output/review/governance_audit_pr_comment.md \
            --emit-github-warning

      - name: Upload governance audit advisory artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hotfix-pr-gate-governance-audit
          path: |
            system/output/review/*_branch_governance_audit.json
            system/output/review/*_branch_governance_audit.md

      - name: Render governance audit advisory PR comment body
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f system/output/review/governance_audit_pr_comment.md

      - name: Upsert governance audit advisory PR comment
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- fenlie-governance-audit-advisory -->';
            const commentPath = 'system/output/review/governance_audit_pr_comment.md';
            if (!fs.existsSync(commentPath)) {
              core.warning(`governance audit PR comment body missing at ${commentPath}`);
              return;
            }
            const body = fs.readFileSync(commentPath, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && typeof comment.body === 'string' && comment.body.includes(marker);
            });
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
